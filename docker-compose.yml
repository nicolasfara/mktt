services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "8883:8883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      # Certificates are not stored in git. Run mosquitto/generate-certs.sh once before
      # starting this service and before running Gradle tests.
      - ./mosquitto/certs:/mosquitto/certs:ro
