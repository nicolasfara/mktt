name: CI/CD Process

on:
  workflow_call:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-2025, macos-14, ubuntu-24.04 ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Find if secrets are available
        id: detect-secrets
        uses: DanySK/are-secrets-available@1.0.0
        with:
          secrets: ${{ toJson(secrets) }}
      - name: Set run-with-secrets condition
        id: require-secrets
        run: |
          echo "run-with-secrets=${{ steps.detect-secrets.outputs.has-secrets == 'true' && !github.event.repository.fork }}" >> $GITHUB_OUTPUT
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Determine dry-run flag
        id: check_branch
        shell: bash
        run: |
          ruby << 'RUBY' >> $GITHUB_OUTPUT
            branch = ENV['GITHUB_REF'].sub(/^refs\/heads\//, '')
            keywords = %w[gradle kotlin publish release deploy]
            dry = keywords.any? { |kw| branch.include?(kw) } ? '' : '--dry-run'
            puts "dry_run=#{dry}"
          RUBY
      - name: Install and start Mosquitto broker (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y mosquitto
          sudo systemctl stop mosquitto || true
          CERT_DIR="${{ github.workspace }}/mosquitto/certs"
          CONF="${{ runner.temp }}/mosquitto-test.conf"
          {
            echo "allow_anonymous true"
            echo "listener 1883"
            echo "listener 8883"
            echo "cafile $CERT_DIR/ca.crt"
            echo "certfile $CERT_DIR/server.crt"
            echo "keyfile $CERT_DIR/server.key"
            echo "require_certificate false"
          } > "$CONF"
          mosquitto -c "$CONF" -d
          sleep 2
      - name: Install and start Mosquitto broker (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install mosquitto
          CERT_DIR="${{ github.workspace }}/mosquitto/certs"
          CONF="${{ runner.temp }}/mosquitto-test.conf"
          {
            echo "allow_anonymous true"
            echo "listener 1883"
            echo "listener 8883"
            echo "cafile $CERT_DIR/ca.crt"
            echo "certfile $CERT_DIR/server.crt"
            echo "keyfile $CERT_DIR/server.key"
            echo "require_certificate false"
          } > "$CONF"
          mosquitto -c "$CONF" -d
          sleep 2
      - name: Install and start Mosquitto broker (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install mosquitto --no-progress -y
          Stop-Service -Name "Mosquitto Broker" -ErrorAction SilentlyContinue
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path", "Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path", "User")
          $certDir = "${{ github.workspace }}\mosquitto\certs"
          $confPath = "${{ runner.temp }}\mosquitto-test.conf"
          @(
            "allow_anonymous true",
            "listener 1883",
            "listener 8883",
            "cafile $certDir\ca.crt",
            "certfile $certDir\server.crt",
            "keyfile $certDir\server.key",
            "require_certificate false"
          ) | Set-Content -Path $confPath -Encoding ASCII
          Start-Process -NoNewWindow -FilePath (Get-Command mosquitto.exe).Source -ArgumentList "-c", $confPath -PassThru | Tee-Object -Variable proc
          Start-Sleep -Seconds 3
          if ($proc.HasExited) { Write-Error "Mosquitto failed to start"; exit 1 }
      - uses: DanySK/build-check-deploy-gradle-action@4.0.24
        with:
          deploy-command: >-
            ./gradlew
            publishAllPublicationsToProjectLocalRepository 
            zipMavenCentralPortalPublication
            releaseMavenCentralPortalPublication
            ${{ steps.check_branch.outputs.dry_run }}
          should-run-codecov: ${{ runner.os == 'Linux' }}
          codecov-token: ${{ secrets.CODECOV_TOKEN }}
          should-deploy: ${{ runner.os == 'macOS' && steps.require-secrets.outputs.run-with-secrets == 'true' }}
          maven-central-username: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          maven-central-password: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          signing-key: ${{ secrets.SIGNING_KEY }}
          signing-password: ${{ secrets.SIGNING_PASSWORD }}

  release:
    needs:
      - build
    runs-on: macos-15
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.DEPLOYMENT_TOKEN }}
      - name: Install Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: package.json
      - uses: DanySK/build-check-deploy-gradle-action@4.0.24
        with:
          retries-on-failure: '1'
          build-command: true
          check-command: true
          deploy-command: |
            npm install
            npx semantic-release
          should-run-codecov: false
          should-deploy: true
          github-token: ${{ github.token }}
          maven-central-username: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          maven-central-password: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          npm-token: ${{ secrets.NPM_TOKEN }}
          signing-key: ${{ secrets.SIGNING_KEY }}
          signing-password: ${{ secrets.SIGNING_PASSWORD }}

  success:
    runs-on: ubuntu-24.04
    needs:
      - build
      - release
    if: >-
      always() && (
        contains(join(needs.*.result, ','), 'failure')
        || !contains(join(needs.*.result, ','), 'cancelled')
      )
    steps:
      - name: Verify that there were no failures
        run: ${{ !contains(join(needs.*.result, ','), 'failure') }}