# Mosquitto MQTT broker configuration for local development and CI testing

# Standard MQTT listener (TCP)
listener 1883
allow_anonymous true

# MQTT over TLS/SSL listener
listener 8883
allow_anonymous true
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
require_certificate false

# Persistence
persistence false

# Logging
log_type error
log_type warning
log_type notice
log_type information
